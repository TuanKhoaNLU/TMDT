spring.application.name=TMDT_CK
server.port=8080
server.error.include-message=always
spring.config.import=optional:file:.env[.properties]

spring.datasource.url=${MYSQL_URL:jdbc:mysql://localhost:3306/e_commerce?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Ho_Chi_Minh&useSSL=false&allowPublicKeyRetrieval=true}
spring.datasource.username=${MYSQL_USER:root}
spring.datasource.password=${MYSQL_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.initialization-fail-timeout=0
spring.datasource.hikari.connection-timeout=1500
spring.sql.init.mode=never

spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.timeout=1500ms

app.default-buyer-id=${DEFAULT_BUYER_ID:1}
app.default-shop-id=${DEFAULT_SHOP_ID:1}

marketplace.cart.ttl-days=${CART_TTL_DAYS:7}
marketplace.commission-rate=${COMMISSION_RATE:0.10}

app.frontend.url=${APP_FRONTEND_URL:http://localhost:5173}

ghn.token=${GHN_TOKEN:}
ghn.shop-id=${GHN_SHOP_ID:}
ghn.base-url=${GHN_BASE_URL:https://online-gateway.ghn.vn/shiip/public-api}
ghn.from-district-id=${GHN_FROM_DISTRICT_ID:1442}
ghn.from-ward-code=${GHN_FROM_WARD_CODE:20101}
ghn.service-type-id=${GHN_SERVICE_TYPE_ID:2}
ghn.payment-type-id=${GHN_PAYMENT_TYPE_ID:2}
ghn.required-note=${GHN_REQUIRED_NOTE:CHOXEMHANGKHONGTHU}
ghn.package.length=${GHN_PACKAGE_LENGTH:20}
ghn.package.width=${GHN_PACKAGE_WIDTH:15}
ghn.package.height=${GHN_PACKAGE_HEIGHT:10}

vnpay.mock-enabled=${VNPAY_MOCK_ENABLED:false}
vnpay.tmn-code=${VNPAY_TMN_CODE:VNPAY_TEST}
vnpay.hash-secret=${VNPAY_HASH_SECRET:}
vnpay.pay-url=${VNPAY_PAY_URL:https://sandbox.vnpayment.vn/paymentv2/vpcpay.html}
vnpay.return-url=${VNPAY_RETURN_URL:http://localhost:5173/payment-result}
